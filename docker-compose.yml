services:

  # ─── PostgreSQL 17 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: fas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fas_user
      POSTGRES_PASSWORD: fas_pass
      POSTGRES_DB: fas_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - fas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fas_user -d fas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fas_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass fas_redis_pass
    ports:
      - "6379:6379"
    volumes:
      - fas_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "fas_redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── pgAdmin 4 ──────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fas_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@viain.cl
      PGADMIN_DEFAULT_PASSWORD: fas_admin_pass
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - fas_pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Redis Commander ─────────────────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: fas_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379:0:fas_redis_pass"
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

  # ─── API (fas-api) ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./fas-api
      dockerfile: Dockerfile.dev
    container_name: fas_api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://fas_user:fas_pass@postgres:5432/fas_db
      REDIS_URL: redis://:fas_redis_pass@redis:6379
      NODE_ENV: development
      PORT: 3001
      BETTER_AUTH_SECRET: fas_super_secret_key_cambiar_en_produccion_32chars
      BETTER_AUTH_URL: http://localhost:3001
      EMAIL_FROM: noreply@agrosan.cl
      DTE_PROVIDER: mock
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - ./fas-api:/app
      - fas_api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Web (fas-web) ───────────────────────────────────────────────────────────
  web:
    build:
      context: ./fas-web
      dockerfile: Dockerfile.dev
    container_name: fas_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      # Solo servidor: dentro de la red de Docker, "localhost" apunta al propio
      # contenedor web, no a fas-api. El route handler de auth (server-side) usa
      # esta variable para llegar al servicio "api" por su nombre de red.
      INTERNAL_API_URL: http://api:3001
      NEXT_PUBLIC_SENTRY_DISABLED: "true"
    volumes:
      - ./fas-web:/app
      - fas_web_node_modules:/app/node_modules
      - fas_web_next:/app/.next
    depends_on:
      - api

volumes:
  fas_postgres_data:
    driver: local
  fas_redis_data:
    driver: local
  fas_pgadmin_data:
    driver: local
  fas_api_node_modules:
    driver: local
  fas_web_node_modules:
    driver: local
  fas_web_next:
    driver: local
